parameters:
  - name: npm_config_cache
    type: string
    default: $(Pipeline.Workspace)/.npm_e2e

  - name: PlaywrightUserEmail
    type: string
    default: ''

  - name: PlaywrightPassword
    type: string
    default: ''

  - name: ASPNETCORE_URLS
    type: string
    default: ''

  - name: runBuild
    type: boolean
    default: true

steps:
  - task: NodeTool@0
    displayName: "E2E: Use Node.js"
    retryCountOnTaskFailure: 3
    inputs:
      versionSource: fromFile
      versionFilePath: tests/Umbraco.Tests.AcceptanceTest/.nvmrc

  - pwsh: |
      "UMBRACO_USER_LOGIN=${{ parameters.PlaywrightUserEmail }}
      UMBRACO_USER_PASSWORD=${{ parameters.PlaywrightPassword }}
      URL=${{ parameters.ASPNETCORE_URLS }}
      STORAGE_STATE_PATH=$(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest/playwright/.auth/user.json
      CONSOLE_ERRORS_PATH=$(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest/console-errors.json" | Out-File .env
    displayName: "E2E: Generate .env"
    workingDirectory: $(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest

  # Cache and restore NPM packages
  - task: Cache@2
    displayName: "E2E: Cache NPM packages"
    inputs:
      key: 'npm_e2e | "$(Agent.OS)" | $(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest/package-lock.json'
      restoreKeys: |
        npm_e2e | "$(Agent.OS)"
        npm_e2e
      path: ${{ parameters.npm_config_cache }}

  - script: npm ci --no-fund --no-audit --prefer-offline
    workingDirectory: $(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest
    displayName: "E2E: Restore NPM packages"
    env:
      npm_config_cache: ${{ parameters.npm_config_cache }}

  - ${{ if parameters.runBuild }}:
    - script: npm run build
      workingDirectory: $(Build.SourcesDirectory)/tests/Umbraco.Tests.AcceptanceTest
      displayName: "E2E: Build test helpers"
