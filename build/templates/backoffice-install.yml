parameters:
  - name: npm_config_cache
    type: string
    default: $(Pipeline.Workspace)/.npm_client

steps:
  - task: NodeTool@0
    displayName: "Backoffice: Use Node.js"
    retryCountOnTaskFailure: 3
    inputs:
      versionSource: 'fromFile'
      versionFilePath: src/Umbraco.Web.UI.Client/.nvmrc

  - template: set-npm-version.yml
    parameters:
      workingDirectory: src/Umbraco.Web.UI.Client

  - task: Cache@2
    displayName: "Backoffice: Cache NPM packages"
    inputs:
      key: '"npm_client" | "$(Agent.OS)"| $(Build.SourcesDirectory)/src/Umbraco.Web.UI.Client/package-lock.json'
      restoreKeys: |
        "npm_client" | "$(Agent.OS)"
        "npm_client"
      path: ${{ parameters.npm_config_cache }}

  - script: npm ci --no-fund --no-audit --prefer-offline
    displayName: "Backoffice: Restore NPM packages"
    workingDirectory: src/Umbraco.Web.UI.Client
    env:
      npm_config_cache: ${{ parameters.npm_config_cache }}
