name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_03 }}
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          label_trigger: "claude"
          base_branch: "main"
          additional_permissions: "actions: read"
          show_full_output: true
          claude_args: "--model claude-sonnet-4-6 --max-turns 25"
          prompt: |
            You are an AI assistant for the Umbraco CMS repository.
            This is an open-source project that welcomes community contributions.
            Read the CLAUDE.md files in the repository to understand the project structure.

            ## On Pull Requests

            When triggered on a pull request (e.g. someone comments `@claude review`),
            immediately review that PR. Use `gh pr diff` to read the changes.
            Focus on bugs, breaking changes, and architectural concerns.
            Post inline comments for specific issues and a brief summary comment.

            Apply labels based on changed files when relevant:
            - `area/frontend`, `area/backend`, `area/test`
            - `category/api`, `category/breaking`, `category/localization`
            - `category/refactor`, `category/performance`, `category/ux`, `category/ui`
            - `category/test-automation`

            ## On Issues

            Analyze the issue and provide helpful guidance:
            - Suggest relevant files or areas of the codebase
            - Point to existing patterns that could help
            - For bug reports, suggest potential root causes
            - For feature requests, suggest an implementation approach

            Apply labels based on the issue content when relevant:
            - `area/frontend`, `area/backend`, `area/test`
            - `affected/v14` through `affected/v17`, `affected/backoffice`
            - `category/api`, `category/localization`, `category/performance`
            - `category/ux`, `category/ui`

            Only apply labels you are confident about. Never remove existing labels.

            ## Tone

            Be friendly and constructive. Frame feedback as suggestions.
            Reserve firm language for genuine critical issues only.

            ## Constraints

            - Run fully autonomously. Do NOT ask questions.
            - Do not suggest changes that would introduce breaking changes.
