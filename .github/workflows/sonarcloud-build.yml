name: "SonarQube Cloud - Build"

on:
  push:
    branches:
      - main
      - "v*/dev"
      - "v*/main"
      - "release/*"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SONAR_ORGANIZATION: "umbraco"
  SONAR_PROJECT_KEY: "umbraco_Umbraco-CMS"

jobs:
  build:
    name: Build and collect analysis data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global nbgv
          dotnet tool install --global dotnet-coverage

      - name: Get project version
        run: |
          PUBLIC_RELEASE=$(nbgv get-version -v PublicRelease)
          if [ "$PUBLIC_RELEASE" = "True" ]; then
            echo "PROJECT_VERSION=$(nbgv get-version -v NuGetPackageVersion)" >> $GITHUB_ENV
          fi

      - name: Set branch name
        if: github.event_name == 'workflow_dispatch'
        run: echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Begin analysis
        run: |
          dotnet-sonarscanner begin \
            /k:"${{ env.SONAR_PROJECT_KEY }}" \
            /o:"${{ env.SONAR_ORGANIZATION }}" \
            /d:sonar.cs.vscoveragexml.reportsPaths="TestResults/coverage.xml" \
            /d:sonar.inclusions="src/**,templates/**,tools/**,tests/**" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/node_modules/**,**/lang/*.ts,**/mocks/**,**/wwwroot/**,**/dist-cms/**,**/*.generated.cs,src/Umbraco.Web.UI/umbraco/**,src/Umbraco.Cms.Persistence.EFCore.*/Migrations/**,src/Umbraco.Web.UI.Client/src/packages/core/backend-api/**" \
            /d:sonar.test.inclusions="tests/**,**/*.test.ts,**/*.spec.ts" \
            /d:sonar.coverage.exclusions="src/Umbraco.Web.UI.Client/**,src/Umbraco.Web.UI.Login/**" \
            /d:sonar.typescript.tsconfigPaths="src/Umbraco.Web.UI.Client/tsconfig.json,src/Umbraco.Web.UI.Client/tsconfig.node.json,src/Umbraco.Web.UI.Login/tsconfig.json" \
            /d:sonar.scm.disabled=true \
            ${BRANCH_NAME:+/d:sonar.branch.name="$BRANCH_NAME"} \
            ${PROJECT_VERSION:+/d:sonar.projectVersion="$PROJECT_VERSION"}

      - name: Restore
        run: dotnet restore umbraco.sln

      - name: Build solution
        run: dotnet build umbraco.sln --no-restore -clp:ErrorsOnly

      - name: Run unit tests with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test tests/Umbraco.Tests.UnitTests/Umbraco.Tests.UnitTests.csproj --no-build" \
            --output TestResults/coverage.xml \
            --output-format xml

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonar-analysis-data
          include-hidden-files: true
          path: |
            .sonarqube/
            TestResults/
          retention-days: 1
